[pytest]
# Pytest configuration for plan-export plugin tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    stress: marks tests as stress tests
    race: marks tests as race condition tests
    baseline: marks tests as baseline functionality tests
    concurrent: marks tests as concurrent execution tests

# Coverage options (if pytest-cov is installed)
[coverage:run]
source = scripts
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
