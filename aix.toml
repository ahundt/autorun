[package]
name = "clautorun"
version = "0.8.0"
description = "Autonomous execution, file policies, safety guards for AI coding assistants"
authors = ["Andrew Hundt <athundt@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/ahundt/clautorun"

# Platform support
[platforms]
claude_code = true
gemini_cli = true
opencode = true   # Experimental
codex_cli = true  # Experimental

# Dependencies
[dependencies]
python = ">=3.10"
bashlex = ">=0.18"

# Skill definitions (3 total)
[[skills]]
name = "CLI_USAGE_AND_TEST_AUTOMATION_WITH_BYOBU_TMUX_SESSIONS"
description = "Simple and safe tmux session management. Creates isolated sessions that won't interfere with your current Claude Code session."
path = "plugins/clautorun/skills/CLI_USAGE_AND_TEST_AUTOMATION_WITH_BYOBU_TMUX_SESSIONS.md"

[[skills]]
name = "parallel_process_subagent_execution"
description = "Parallel Merge and Commit Workflow. Execute multiple subagents in parallel for faster development."
path = "plugins/clautorun/skills/parallelmerge.md"

[[skills]]
name = "claude_session_tools"
description = "Explore, search, analyze, and export Claude Code session histories."
path = "plugins/clautorun/skills/claude-session-tools/SKILL.md"

# Command definitions (showing 10 most important of 73 total)
[[commands]]
name = "go"
aliases = ["run"]
description = "Start autorun - autonomous task execution"
path = "plugins/clautorun/commands/go.md"

[[commands]]
name = "gp"
aliases = ["proc"]
description = "Start autoproc - procedural autonomous workflow"
path = "plugins/clautorun/commands/gp.md"

[[commands]]
name = "a"
aliases = ["allow", "afa"]
description = "Allow all file creation - full permission to create and modify files"
path = "plugins/clautorun/commands/a.md"

[[commands]]
name = "j"
aliases = ["justify", "afj"]
description = "Require justification before creating new files"
path = "plugins/clautorun/commands/j.md"

[[commands]]
name = "f"
aliases = ["find", "afs"]
description = "Find existing files only - prevents new file creation (strictest mode)"
path = "plugins/clautorun/commands/f.md"

[[commands]]
name = "st"
aliases = ["status", "afst"]
description = "Show current AutoFile policy and settings"
path = "plugins/clautorun/commands/st.md"

[[commands]]
name = "sos"
aliases = ["estop"]
description = "Emergency stop - immediately halt all autonomous operations"
path = "plugins/clautorun/commands/sos.md"

[[commands]]
name = "plannew"
aliases = ["pn"]
description = "Create new plan from scratch with Wait Process methodology"
path = "plugins/clautorun/commands/plannew.md"

[[commands]]
name = "planrefine"
aliases = ["pr"]
description = "Deep critique existing plan with code verification"
path = "plugins/clautorun/commands/planrefine.md"

[[commands]]
name = "commit"
aliases = ["gc"]
description = "Display Git Commit Requirements - comprehensive guidelines for high-quality commit messages"
path = "plugins/clautorun/commands/commit.md"

# Platform-specific hooks (not translated - kept native)
[hooks.claude_code]
path = "plugins/clautorun/hooks/hooks.json"

[hooks.gemini_cli]
path = "plugins/clautorun/hooks/gemini-hooks.json"

# Installation hooks (custom AIX extension)
# CRITICAL: Only performs LOCAL installation (aix skills install .)
# Does NOT publish to public AIX registry
[install.claude_code]
command = ["uv", "pip", "install", "git+https://github.com/ahundt/clautorun.git"]
post_install = ["clautorun", "--install"]

[install.gemini_cli]
command = ["uv", "pip", "install", "git+https://github.com/ahundt/clautorun.git"]
post_install = ["clautorun", "--install", "--gemini", "--conductor"]

[install.opencode]
command = ["uv", "pip", "install", "git+https://github.com/ahundt/clautorun.git"]
post_install = ["clautorun", "--install", "--opencode"]

[install.codex_cli]
command = ["uv", "pip", "install", "git+https://github.com/ahundt/clautorun.git"]
post_install = ["clautorun", "--install", "--codex"]
